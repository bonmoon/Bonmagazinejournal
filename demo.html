<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1A1512">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Reflections — Cityboy Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #171310;
      --bg-elevated: #201916;
      --panel: #28211c;
      --panel-soft: #312924;
      --panel-ink: #221b17;
      --line: rgba(248, 239, 226, 0.09);
      --line-strong: rgba(248, 239, 226, 0.14);
      --text: #F2EBDD;
      --text-soft: #B7AA99;
      --text-dim: #8C8074;
      --cream: #F4EBDD;
      --accent: #6E8FB8;
      --accent-soft: #89A6C9;
      --accent-deep: #3E5A7C;
      --accent-warm: #C4714A;
      --success: #688F72;
      --radius: 26px;
      --radius-sm: 20px;
      --page-pad: 14px;
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.34);
    }

    html,
    body {
      min-height: 100%;
      background: linear-gradient(180deg, #15110f 0%, #1C1512 100%);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    img {
      display: block;
      max-width: 100%;
    }

    input,
    textarea {
      border: none;
      outline: none;
      background: transparent;
    }

    .screen {
      display: none;
      min-height: 100vh;
      animation: fade-in 0.2s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page-shell {
      width: min(1880px, 100%);
      margin: 0 auto;
      padding: 10px var(--page-pad) 108px;
    }

    .mag-frame {
      min-height: calc(100vh - 20px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent), var(--bg-elevated);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .screen-cover .mag-frame {
      background: #15110f;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.01);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-kicker,
    .section-kicker,
    .field-kicker {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-style: italic;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .meta-block {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--text-soft);
      font-size: 11px;
    }

    .meta-issue {
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .module-shell {
      padding: 16px;
    }

    .module-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 4px 0 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .module-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 2.7rem);
      line-height: 0.92;
      letter-spacing: -0.04em;
    }

    .module-copy {
      margin-top: 8px;
      max-width: 46rem;
      color: var(--text-soft);
      font-size: 13px;
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-btn,
    .solid-btn,
    .pill-btn,
    .template-btn,
    .mood-btn,
    .cover-choice,
    .dock-btn {
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s ease;
    }

    .ghost-btn,
    .pill-btn,
    .template-btn,
    .mood-btn {
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--cream);
    }

    .ghost-btn,
    .solid-btn {
      padding: 12px 16px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .solid-btn {
      background: var(--accent);
      color: #F9F4EB;
      border: 1px solid rgba(110, 143, 184, 0.35);
    }

    .ghost-btn:hover,
    .pill-btn:hover,
    .template-btn:hover,
    .mood-btn:hover,
    .cover-choice:hover {
      border-color: rgba(244, 235, 221, 0.24);
      background: rgba(255, 255, 255, 0.03);
    }

    .solid-btn:hover {
      background: var(--accent-soft);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px;
    }

    .panel-soft {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .today-grid,
    .notes-grid,
    .archive-grid,
    .music-grid,
    .write-grid {
      display: grid;
      gap: 16px;
    }

    .cover-scene {
      min-height: calc(100vh - 140px);
      display: grid;
      place-items: center;
      padding: 20px 14px 10px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 34%),
        #15110f;
    }

    .cover-card {
      width: min(100%, 860px);
      aspect-ratio: 1024 / 1536;
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 26px 76px rgba(0, 0, 0, 0.4);
    }

    .cover-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-composed {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: #F7F0E4;
      color: #1C1A16;
    }

    .cover-blue-top,
    .cover-blue-bottom {
      position: absolute;
      left: 0;
      right: 0;
      background: #77A7D8;
      color: #FFF7E7;
      text-align: center;
      z-index: 1;
    }

    .cover-blue-top {
      top: 0;
      height: 22%;
      padding-top: 5%;
    }

    .cover-blue-bottom {
      bottom: 0;
      height: 9%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 2.5rem);
      font-style: italic;
      letter-spacing: -0.02em;
    }

    .cover-mini {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.55rem, 1vw, 0.75rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(28, 26, 22, 0.74);
    }

    .cover-logo {
      margin-top: 2%;
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.8rem, 12vw, 8rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.08em;
      color: #FBF5E8;
    }

    .cover-issue {
      position: absolute;
      right: 4%;
      top: 11%;
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.58rem, 1vw, 0.8rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(28, 26, 22, 0.74);
      z-index: 2;
    }

    .cover-persona {
      position: absolute;
      inset: auto 10% 8% 10%;
      height: 72%;
      width: auto;
      margin: auto;
      object-fit: contain;
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(0 24px 28px rgba(28, 26, 22, 0.16));
    }

    .cover-blob {
      position: absolute;
      z-index: 3;
      padding: 14px 22px;
      border-radius: 999px;
      color: #FFF7E7;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.9rem, 1.8vw, 1.35rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow: 0 12px 24px rgba(28, 26, 22, 0.12);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .cover-blob.style {
      left: 4%;
      top: 48%;
      background: #F37024;
      transform: rotate(-8deg);
    }

    .cover-blob.music {
      right: 4%;
      top: 41%;
      background: #F06B63;
      transform: rotate(6deg);
    }

    .cover-blob.travel {
      left: 5%;
      bottom: 16%;
      background: #7FA146;
      transform: rotate(-8deg);
    }

    .hotspot {
      position: absolute;
      z-index: 4;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.46);
      background: rgba(18, 16, 14, 0.22);
      backdrop-filter: blur(8px);
      color: #FFF7E7;
      font-size: 0;
      overflow: hidden;
    }

    .hotspot::after {
      content: '';
      position: absolute;
      inset: 50% auto auto 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 247, 231, 0.92);
      box-shadow: 0 0 0 8px rgba(255, 247, 231, 0.12);
    }

    .hotspot.labelled {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 14px;
      width: auto;
      height: auto;
      min-width: 92px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #FFF7E7;
    }

    .hotspot.labelled::after {
      display: none;
    }

    .cover-default .spot-music {
      left: 69%;
      top: 28%;
      width: 52px;
      height: 52px;
    }

    .cover-default .spot-write {
      left: 14%;
      top: 37%;
      width: 46px;
      height: 46px;
    }

    .cover-default .spot-today {
      left: 12%;
      top: 61%;
      width: 46px;
      height: 46px;
    }

    .cover-default .spot-travel {
      left: 16%;
      top: 86%;
      width: 50px;
      height: 50px;
    }

    .cover-default .spot-style {
      left: 12%;
      top: 52%;
      width: 130px;
      height: 56px;
      opacity: 0.01;
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
    }

    .cover-default .spot-archive {
      right: 4%;
      top: 88%;
      width: 54px;
      height: 54px;
    }

    .cover-composed .spot-write {
      left: 8%;
      top: 38%;
      width: 110px;
      height: 44px;
    }

    .cover-composed .spot-music {
      right: 8%;
      top: 28%;
      width: 54px;
      height: 54px;
    }

    .cover-composed .spot-style {
      left: 5%;
      top: 48%;
      width: 170px;
      height: 64px;
      opacity: 0.01;
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
    }

    .cover-composed .spot-travel {
      left: 6%;
      bottom: 18%;
      width: 170px;
      height: 64px;
      opacity: 0.01;
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
    }

    .cover-composed .spot-archive {
      right: 6%;
      bottom: 18%;
      width: 54px;
      height: 54px;
    }

    .cover-composed .spot-today {
      right: 8%;
      top: 61%;
      width: 54px;
      height: 54px;
    }

    .cover-meta {
      padding: 14px 0 0;
      text-align: center;
      color: var(--text-soft);
      font-size: 12px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .panel-copy {
      color: var(--text-soft);
      font-size: 13px;
    }

    .today-grid {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .lead-card {
      min-height: 270px;
      display: grid;
      gap: 16px;
      align-content: space-between;
      background: linear-gradient(140deg, rgba(110, 143, 184, 0.16), rgba(196, 113, 74, 0.08)), var(--panel);
    }

    .lead-card .panel-title {
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 0.95;
    }

    .stats-list,
    .week-list,
    .entry-list,
    .track-list,
    .character-list,
    .note-list {
      display: grid;
      gap: 10px;
    }

    .stat-row,
    .entry-card,
    .track-card,
    .character-card,
    .note-card {
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .entry-card.active {
      border-color: rgba(110, 143, 184, 0.34);
      background: rgba(110, 143, 184, 0.08);
    }

    .week-list {
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .week-chip {
      padding: 12px 8px;
      border-radius: 18px;
      border: 1px solid var(--line);
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .week-chip.done {
      background: rgba(110, 143, 184, 0.14);
      border-color: rgba(110, 143, 184, 0.34);
    }

    .week-chip.today {
      box-shadow: inset 0 0 0 1px rgba(244, 235, 221, 0.36);
    }

    .week-num {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--cream);
    }

    .week-day {
      display: block;
      margin-top: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .entry-meta,
    .micro-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .entry-title {
      margin-top: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .entry-body {
      margin-top: 8px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .template-row,
    .mood-row,
    .cover-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .template-row::-webkit-scrollbar,
    .mood-row::-webkit-scrollbar,
    .cover-row::-webkit-scrollbar {
      display: none;
    }

    .template-btn,
    .mood-btn {
      padding: 11px 16px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .template-btn.active,
    .mood-btn.active {
      background: var(--cream);
      color: #251D18;
      border-color: rgba(244, 235, 221, 0.28);
    }

    .write-grid {
      grid-template-columns: 1.15fr 0.85fr;
      align-items: start;
    }

    .write-column {
      display: grid;
      gap: 18px;
    }

    .editor-stack {
      display: grid;
      gap: 18px;
    }

    .editor-grid {
      display: grid;
      gap: 18px;
    }

    .editor-grid.editorial,
    .editor-grid.quote,
    .editor-grid.list {
      grid-template-columns: 1fr 1fr;
    }

    .editor-grid.minimal {
      grid-template-columns: 1fr 1fr;
    }

    .editor-grid.photo {
      grid-template-columns: 1fr 1fr;
    }

    .field-card {
      padding: 18px;
      border-radius: 28px;
      background: var(--panel);
      border: 1px solid var(--line);
      min-height: 160px;
    }

    .field-card.tight {
      min-height: 118px;
    }

    .field-card.hero {
      min-height: 260px;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at center, rgba(110, 143, 184, 0.08), transparent 48%),
        var(--panel);
    }

    .field-card.full-span {
      grid-column: 1 / -1;
    }

    .field-card.hidden-for-template {
      display: none;
    }

    .field-input-title,
    .field-input-subtitle,
    .field-input-body,
    .field-input-quote,
    .field-input-mini {
      width: 100%;
      resize: none;
      color: var(--cream);
    }

    .field-input-title {
      min-height: 132px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.2rem, 5vw, 4.6rem);
      line-height: 0.93;
      letter-spacing: -0.05em;
    }

    .field-input-subtitle {
      min-height: 112px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 2vw, 2rem);
      font-style: italic;
      line-height: 1.32;
      color: var(--text-soft);
    }

    .field-input-body {
      min-height: 260px;
      font-size: 14px;
      line-height: 2;
      color: var(--text-soft);
    }

    .field-input-quote {
      min-height: 180px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.7rem, 3vw, 2.4rem);
      font-style: italic;
      line-height: 1.45;
      color: var(--cream);
    }

    .field-input-mini {
      min-height: 84px;
      font-size: 13px;
      line-height: 1.8;
      color: var(--text-soft);
    }

    .field-input-title::placeholder,
    .field-input-subtitle::placeholder,
    .field-input-body::placeholder,
    .field-input-quote::placeholder,
    .field-input-mini::placeholder {
      color: rgba(244, 235, 221, 0.44);
    }

    .upload-button {
      padding: 13px 24px;
      border-radius: 999px;
      background: rgba(244, 235, 221, 0.94);
      color: #2A221C;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .upload-stage {
      position: relative;
      width: 100%;
      min-height: 220px;
      border-radius: 24px;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, rgba(110, 143, 184, 0.08), transparent), rgba(255, 255, 255, 0.01);
      border: 1px dashed rgba(244, 235, 221, 0.16);
    }

    .upload-stage img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 14px;
      background: rgba(0, 0, 0, 0.12);
    }

    .cover-choice {
      width: 112px;
      min-width: 112px;
      height: 144px;
      padding: 8px;
      border: 1px solid var(--line-strong);
      overflow: hidden;
      position: relative;
      color: var(--text-soft);
    }

    .cover-choice.active {
      border-color: rgba(110, 143, 184, 0.56);
      box-shadow: inset 0 0 0 1px rgba(110, 143, 184, 0.42);
    }

    .cover-choice img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.92;
    }

    .cover-choice span {
      position: relative;
      z-index: 1;
      width: 100%;
      align-self: flex-end;
      margin-top: auto;
      padding: 8px 10px;
      border-radius: 14px;
      background: rgba(22, 18, 16, 0.66);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .switch-row {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: center;
      padding: 16px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.03);
    }

    .switch-row input {
      width: 20px;
      height: 20px;
      accent-color: var(--cream);
    }

    .preview-panel {
      display: grid;
      gap: 18px;
    }

    .preview-sheet {
      position: relative;
      border-radius: 26px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent), var(--panel-soft);
      border: 1px solid var(--line);
      overflow: hidden;
      min-height: 320px;
    }

    .preview-cover {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.96;
      z-index: 3;
      pointer-events: none;
    }

    .preview-inner {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 14px;
      padding: 22px;
    }

    .journal-sheet {
      position: relative;
      width: 100%;
      min-height: 560px;

    function storageGet(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (error) {
        return MEMORY_STORE[key] || null;
      }
    }

    function storageSet(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (error) {
        MEMORY_STORE[key] = value;
      }
    }

    function isoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function parseCalendarDate(value) {
      if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
        return new Date(value + 'T00:00:00');
      }
      return new Date(value);
    }

    function niceDate(value) {
      return parseCalendarDate(value).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        weekday: 'short'
      });
    }

    function dayLabel(date) {
      return date.toLocaleDateString('en-US', { weekday: 'short' });
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function excerpt(text, count) {
      const clean = String(text || '').trim().replace(/\s+/g, ' ');
      return clean.length > count ? clean.slice(0, count).trim() + '…' : clean;
    }

    function wordCount(text) {
      const clean = String(text || '').trim();
      return clean ? clean.split(/\s+/).length : 0;
    }

    function nextId(prefix) {
      return prefix + '-' + Date.now() + '-' + Math.random().toString(16).slice(2, 7);
    }

    function daysBetween(left, right) {
      const dayMs = 24 * 60 * 60 * 1000;
      const a = new Date(left.getFullYear(), left.getMonth(), left.getDate()).getTime();
      const b = new Date(right.getFullYear(), right.getMonth(), right.getDate()).getTime();
      return Math.round((a - b) / dayMs);
    }

          }

          }
        ]

    }

    // Rehydrate saved data safely, while also repairing any missing draft fields after schema changes.
    function loadState() {
      const raw = storageGet(STORAGE_KEY);
      if (!raw) {
        return buildDefaultState();
      }

      try {
        const parsed = JSON.parse(raw);
        return {
          ...buildDefaultState(),
          ...parsed,
          draft: {
            ...defaultDraft(),
            ...(parsed.draft || {}),
            listItems: Array.isArray(parsed.draft && parsed.draft.listItems) && parsed.draft.listItems.length
              ? parsed.draft.listItems

    // Compute streaks, trophy unlocks, and selected persona availability from the saved entry archive.
    function deriveStats(state) {
      const entries = [...state.entries].sort((left, right) => new Date(right.createdAt) - new Date(left.createdAt));
      const dateSet = [...new Set(entries.map((entry) => entry.date))].sort((left, right) => parseCalendarDate(right) - parseCalendarDate(left));
      const totalWords = entries.reduce((sum, entry) => sum + (entry.wordCount || wordCount(entry.body)), 0);
      const linkedSongs = entries.filter((entry) => entry.linkedTrack).length;
      const photoEntries = entries.filter((entry) => entry.template === 'photo').length;
      const today = new Date();
      const todayKey = isoDate(today);
      let streak = 0;

      if (dateSet.length) {
        const latest = parseCalendarDate(dateSet[0]);
        const gap = daysBetween(today, latest);
        if (gap <= 1) {
          let cursor = latest;
          while (dateSet.includes(isoDate(cursor))) {
            streak += 1;
            cursor = new Date(cursor);
            cursor.setDate(cursor.getDate() - 1);
          }
        }
      }

      const trophies = TROPHIES.map((trophy) => ({
        ...trophy,
        isUnlocked: trophy.unlocked({
          entryCount: entries.length,
          linkedSongs,
          photoEntries,
          totalWords,
          streak
        })
      }));
      const trophyCount = trophies.filter((trophy) => trophy.isUnlocked).length;
      const unlockedPersonas = PERSONAS.filter((persona) => trophyCount >= persona.unlock);
      const selectedPersona = unlockedPersonas.find((persona) => persona.id === state.profile.selectedPersona) || PERSONAS[0];
      const week = [];

      for (let offset = 6; offset >= 0; offset -= 1) {
        const current = new Date(today);
        current.setDate(today.getDate() - offset);
        const currentKey = isoDate(current);
        week.push({
          key: currentKey,
          day: dayLabel(current),
          num: current.getDate(),
          done: dateSet.includes(currentKey),
          today: currentKey === todayKey
        });
      }

      return {
        entries,
        latestEntry: entries[0] || null,
        entryCount: entries.length,
        linkedSongs,
        photoEntries,
        totalWords,
        streak,
        trophies,
        trophyCount,
        unlockedPersonas,
        selectedPersona,
        todayDone: dateSet.includes(todayKey),
        week
      };
    }

    function renderAll() {
      const stats = deriveStats(appState);
      renderCover(stats);
      renderToday(stats);
      renderWrite(stats);
      renderMusic(stats);
      renderStyle(stats);
      renderTravel(stats);
      renderArchive(stats);
      setScreen(currentScreen);
    }

    function setScreen(screen) {
      currentScreen = screen;
      document.querySelectorAll('.screen').forEach((element) => {
        element.classList.toggle('active', element.id === 'screen-' + screen);
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    function updateDraft(field, value) {
      appState.draft[field] = value;
      saveState();
    }

    // Keep the list template editable by storing each row as structured draft data instead of flattening it into body text.
    function updateListItem(index, key, value) {
      if (!appState.draft.listItems[index]) {
        appState.draft.listItems[index] = { title: '', note: '' };
      }
      appState.draft.listItems[index][key] = value;
      saveState();
    }

    function addListItem() {
      appState.draft.listItems.push({ title: '', note: '' });
      saveState();
      renderAll();
      setScreen('write');
    }

    function setCoverChoice(coverId) {
      appState.draft.coverAsset = coverId;
      saveState();
      renderAll();
      setScreen('write');
    }

    function setArchiveView(view) {
      appState.archive.view = view;
      saveState();
      renderAll();
      setScreen('archive');
    }

    function selectArchiveEntry(entryId) {
      appState.archive.selectedEntryId = entryId;
      saveState();
      renderAll();
      setScreen('archive');
    }

    function stepArchiveEntry(delta) {
      const stats = deriveStats(appState);
      const entries = getArchiveEntries(stats);
      if (!entries.length) {
        return;
      }

      const current = getSelectedArchiveEntry(stats);
      const index = current ? entries.findIndex((entry) => entry.id === current.id) : 0;
      const nextIndex = Math.min(entries.length - 1, Math.max(0, index + delta));
      appState.archive.selectedEntryId = entries[nextIndex].id;
      saveState();
      renderAll();
      setScreen('archive');
    }

    function addNote(type) {
      const draftKey = type + 'Draft';
      const listKey = type === 'style' ? 'styleNotes' : 'travelNotes';
      const title = appState[draftKey].title.trim();
      const note = appState[draftKey].note.trim();

      if (!title || !note) {
        showToast('先写一个标题和内容。');
        return;
      }

      appState[listKey].unshift({
        id: nextId(type),
        title,
        note
      });
      appState[draftKey] = { title: '', note: '' };
      saveState();
      renderAll();
      setScreen(type === 'style' ? 'style' : 'travel');
      showToast(type === 'style' ? 'Style note saved.' : 'Travel note saved.');
    }

    function draftToWordCount(draft) {
      if (draft.template === 'list') {
        return draft.listItems.reduce((sum, item) => sum + wordCount(item.title) + wordCount(item.note), 0);
      }
      if (draft.template === 'quote') {
        return wordCount(draft.pullquote) + wordCount(draft.body) + wordCount(draft.quoteBy);
      }
      return wordCount(draft.title) + wordCount(draft.dek) + wordCount(draft.body) + wordCount(draft.pullquote);
    }

    // Publish the current layout-aware draft, then recompute trophies and persona unlock status from the archive.
    function publishEntry() {
      const draft = appState.draft;
      const titleSource = draft.template === 'quote' ? (draft.pullquote || draft.dek) : draft.title;
      const bodySource = draft.template === 'list'
        ? draft.listItems.map((item) => (item.title + ' ' + item.note).trim()).filter(Boolean).join(' ')
        : draft.body || draft.pullquote;

      if (!titleSource.trim() || !bodySource.trim()) {
        showToast('当前版式还需要至少一个标题和正文。');
        return;
      }

      const before = deriveStats(appState);
      const now = new Date();
      const linkedTrack = draft.linkMusic ? TRACKS[appState.currentTrack].title : '';

      const newEntry = {
        id: nextId('entry'),
        date: isoDate(now),
        createdAt: now.toISOString(),
        template: draft.template,
        mood: draft.mood,
        title: titleSource.trim(),
        dek: draft.dek.trim(),
        body: bodySource.trim(),
        pullquote: draft.pullquote.trim(),
        imageData: draft.imageData,
        linkMusic: draft.linkMusic,
        linkedTrack,
        quoteBy: draft.quoteBy.trim(),
        coverAsset: draft.coverAsset,
        listItems: draft.listItems.map((item) => ({ title: item.title, note: item.note })),
        wordCount: draftToWordCount(draft)
      };

      appState.entries.unshift(newEntry);
      appState.archive.view = 'book';
      appState.archive.selectedEntryId = newEntry.id;

      appState.draft = {
        ...defaultDraft(),
        template: draft.template,
        mood: draft.mood,
        coverAsset: draft.coverAsset
      };
      saveState();

      const after = deriveStats(appState);
      renderAll();
      setScreen('archive');

      if (after.trophyCount > before.trophyCount) {
        showToast('Published. New trophy unlocked.');
        return;
      }

      showToast('Published to the archive.');
    }

    function choosePersona(personaId) {
      const stats = deriveStats(appState);
      const persona = getPersona(personaId);

      if (stats.trophyCount < persona.unlock) {
        showToast('还差 ' + (persona.unlock - stats.trophyCount) + ' 枚奖杯。');
        return;
      }

      appState.profile.selectedPersona = personaId;
      saveState();
      renderAll();
      setScreen('cover');
      showToast(persona.name + ' selected.');
    }

    // Demo playback only animates the progress bar and rotates the active track to keep the prototype lightweight.
    function togglePlay() {
      if (playTimer) {
        clearInterval(playTimer);
        playTimer = null;
        renderAll();
        setScreen('music');
        return;
      }

      playTimer = setInterval(() => {
        appState.musicProgress += 3;
        if (appState.musicProgress >= 100) {
          appState.musicProgress = 0;
          appState.currentTrack = (appState.currentTrack + 1) % TRACKS.length;
        }
        saveState();
        if (currentScreen === 'music') {
          renderAll();
          setScreen('music');
        }
      }, 900);

      renderAll();
      setScreen('music');
    }

    function selectTrack(index) {
      appState.currentTrack = index;
      appState.musicProgress = 22;
      saveState();
      renderAll();
      setScreen('music');
      showToast('Track selected for today.');
    }

    function handleImage(file) {
      if (!file) {
        return;
      }

      if (!file.type || !file.type.startsWith('image/')) {
        showToast('请选择图片文件。');
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        appState.draft.imageData = reader.result;
        saveState();
        renderAll();
        setScreen('write');
        showToast('Image added to the draft.');
      };
      reader.onerror = () => {
        showToast('图片读取失败，请再试一次。');
      };
      reader.readAsDataURL(file);
    }

    document.addEventListener('click', (event) => {
      const openTarget = event.target.closest('[data-open]');
      if (openTarget) {
        setScreen(openTarget.getAttribute('data-open'));
        return;
      }

      const templateTarget = event.target.closest('[data-template]');
      if (templateTarget) {
        appState.draft.template = templateTarget.getAttribute('data-template');
        saveState();
        renderAll();
        setScreen('write');
        return;
      }

      const moodTarget = event.target.closest('[data-mood]');
      if (moodTarget) {
        appState.draft.mood = moodTarget.getAttribute('data-mood');
        saveState();
        renderAll();
        setScreen('write');
        return;
      }

      const coverTarget = event.target.closest('[data-cover-choice]');
      if (coverTarget) {
        setCoverChoice(coverTarget.getAttribute('data-cover-choice'));
        return;
      }

      const archiveViewTarget = event.target.closest('[data-archive-view]');
      if (archiveViewTarget) {
        setArchiveView(archiveViewTarget.getAttribute('data-archive-view'));
        return;
      }

      const entryTarget = event.target.closest('[data-entry-id]');
      if (entryTarget) {
        selectArchiveEntry(entryTarget.getAttribute('data-entry-id'));
        return;
      }

      const entryNavTarget = event.target.closest('[data-entry-nav]');
      if (entryNavTarget) {
        stepArchiveEntry(Number(entryNavTarget.getAttribute('data-entry-nav')));
        return;
      }

      const trackTarget = event.target.closest('[data-track-index]');
      if (trackTarget) {
        selectTrack(Number(trackTarget.getAttribute('data-track-index')));
        return;
      }

      const personaTarget = event.target.closest('[data-persona]');
      if (personaTarget) {
        choosePersona(personaTarget.getAttribute('data-persona'));
        return;
      }

      const actionTarget = event.target.closest('[data-action]');
      if (!actionTarget) {
        return;
      }

      const action = actionTarget.getAttribute('data-action');
      if (action === 'publish-entry') {
        publishEntry();
      } else if (action === 'toggle-play') {
        togglePlay();
      } else if (action === 'next-track') {
        selectTrack((appState.currentTrack + 1) % TRACKS.length);
      } else if (action === 'open-image-picker') {
        document.getElementById('draft-image-input').click();
      } else if (action === 'add-style-note') {
        addNote('style');
      } else if (action === 'add-travel-note') {
        addNote('travel');
      } else if (action === 'add-list-item') {
        addListItem();
      }
    });

    document.addEventListener('input', (event) => {
      const field = event.target.getAttribute('data-draft-field');
      if (field) {
        const value = event.target.type === 'checkbox' ? event.target.checked : event.target.value;
        updateDraft(field, value);
        return;
      }

      const listTitle = event.target.getAttribute('data-list-title');
      if (listTitle !== null) {
        updateListItem(Number(listTitle), 'title', event.target.value);
        return;
      }

      const listNote = event.target.getAttribute('data-list-note');
      if (listNote !== null) {
        updateListItem(Number(listNote), 'note', event.target.value);
        return;
      }

      const noteField = event.target.getAttribute('data-note-field');
      if (!noteField) {
        return;
      }

      if (noteField === 'style-title') {
        appState.styleDraft.title = event.target.value;
      } else if (noteField === 'style-note') {
        appState.styleDraft.note = event.target.value;
      } else if (noteField === 'travel-title') {
        appState.travelDraft.title = event.target.value;
      } else if (noteField === 'travel-note') {
        appState.travelDraft.note = event.target.value;
      }

      saveState();
    });

    document.getElementById('draft-image-input').addEventListener('change', (event) => {
      handleImage(event.target.files && event.target.files[0]);
      event.target.value = '';
    });

    renderAll();
  </script>
</body>
</html>
