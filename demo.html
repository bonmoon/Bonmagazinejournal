<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="theme-color" content="#1A1512">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Reflections — Cityboy Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=DM+Sans:wght@300;400;500;700&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg: #171310;
      --bg-elevated: #201916;
      --panel: #28211c;
      --panel-soft: #312924;
      --panel-ink: #221b17;
      --line: rgba(248, 239, 226, 0.09);
      --line-strong: rgba(248, 239, 226, 0.14);
      --text: #F2EBDD;
      --text-soft: #B7AA99;
      --text-dim: #8C8074;
      --cream: #F4EBDD;
      --accent: #6E8FB8;
      --accent-soft: #89A6C9;
      --accent-deep: #3E5A7C;
      --accent-warm: #C4714A;
      --success: #688F72;
      --radius: 26px;
      --radius-sm: 20px;
      --page-pad: 14px;
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.34);
    }

    html,
    body {
      min-height: 100%;
      background: linear-gradient(180deg, #15110f 0%, #1C1512 100%);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.5;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input,
    textarea {
      font: inherit;
      color: inherit;
    }

    button {
      border: none;
      background: none;
      cursor: pointer;
      transition: 0.2s ease;
    }

    img {
      display: block;
      max-width: 100%;
    }

    input,
    textarea {
      border: none;
      outline: none;
      background: transparent;
    }

    .screen {
      display: none;
      min-height: 100vh;
      animation: fade-in 0.2s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .page-shell {
      width: min(1880px, 100%);
      margin: 0 auto;
      padding: 10px var(--page-pad) 108px;
    }

    .mag-frame {
      min-height: calc(100vh - 20px);
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.02), transparent), var(--bg-elevated);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .screen-cover .mag-frame {
      background: #15110f;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.01);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .brand-kicker,
    .section-kicker,
    .field-kicker {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .brand-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem;
      font-style: italic;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .meta-block {
      text-align: right;
      display: flex;
      flex-direction: column;
      gap: 4px;
      color: var(--text-soft);
      font-size: 11px;
    }

    .meta-issue {
      font-family: 'Space Mono', monospace;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .module-shell {
      padding: 16px;
    }

    .module-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      padding: 4px 0 18px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 16px;
    }

    .module-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2rem, 4vw, 2.7rem);
      line-height: 0.92;
      letter-spacing: -0.04em;
    }

    .module-copy {
      margin-top: 8px;
      max-width: 46rem;
      color: var(--text-soft);
      font-size: 13px;
    }

    .toolbar-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .ghost-btn,
    .solid-btn,
    .pill-btn,
    .template-btn,
    .mood-btn,
    .cover-choice,
    .dock-btn {
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: 0.2s ease;
    }

    .ghost-btn,
    .pill-btn,
    .template-btn,
    .mood-btn {
      border: 1px solid var(--line-strong);
      background: transparent;
      color: var(--cream);
    }

    .ghost-btn,
    .solid-btn {
      padding: 12px 16px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .solid-btn {
      background: var(--accent);
      color: #F9F4EB;
      border: 1px solid rgba(110, 143, 184, 0.35);
    }

    .ghost-btn:hover,
    .pill-btn:hover,
    .template-btn:hover,
    .mood-btn:hover,
    .cover-choice:hover {
      border-color: rgba(244, 235, 221, 0.24);
      background: rgba(255, 255, 255, 0.03);
    }

    .solid-btn:hover {
      background: var(--accent-soft);
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 18px;
    }

    .panel-soft {
      background: var(--panel-soft);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 18px;
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .today-grid,
    .notes-grid,
    .archive-grid,
    .music-grid,
    .write-grid {
      display: grid;
      gap: 16px;
    }

    .cover-scene {
      min-height: calc(100vh - 140px);
      display: grid;
      place-items: center;
      padding: 20px 14px 10px;
      background:
        radial-gradient(circle at top, rgba(255, 255, 255, 0.04), transparent 34%),
        #15110f;
    }

    .cover-card {
      width: min(100%, 860px);
      aspect-ratio: 1024 / 1536;
      position: relative;
      border-radius: 30px;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: 0 26px 76px rgba(0, 0, 0, 0.4);
    }

    .cover-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .cover-composed {
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
      background: #F7F0E4;
      color: #1C1A16;
    }

    .cover-blue-top,
    .cover-blue-bottom {
      position: absolute;
      left: 0;
      right: 0;
      background: #77A7D8;
      color: #FFF7E7;
      text-align: center;
      z-index: 1;
    }

    .cover-blue-top {
      top: 0;
      height: 22%;
      padding-top: 5%;
    }

    .cover-blue-bottom {
      bottom: 0;
      height: 9%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 3vw, 2.5rem);
      font-style: italic;
      letter-spacing: -0.02em;
    }

    .cover-mini {
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.55rem, 1vw, 0.75rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(28, 26, 22, 0.74);
    }

    .cover-logo {
      margin-top: 2%;
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.8rem, 12vw, 8rem);
      font-weight: 900;
      line-height: 0.9;
      letter-spacing: -0.08em;
      color: #FBF5E8;
    }

    .cover-issue {
      position: absolute;
      right: 4%;
      top: 11%;
      text-align: right;
      font-family: 'Space Mono', monospace;
      font-size: clamp(0.58rem, 1vw, 0.8rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(28, 26, 22, 0.74);
      z-index: 2;
    }

    .cover-persona {
      position: absolute;
      inset: auto 10% 8% 10%;
      height: 72%;
      width: auto;
      margin: auto;
      object-fit: contain;
      z-index: 2;
      pointer-events: none;
      filter: drop-shadow(0 24px 28px rgba(28, 26, 22, 0.16));
    }

    .cover-blob {
      position: absolute;
      z-index: 3;
      padding: 14px 22px;
      border-radius: 999px;
      color: #FFF7E7;
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(0.9rem, 1.8vw, 1.35rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      box-shadow: 0 12px 24px rgba(28, 26, 22, 0.12);
      border: 1px solid rgba(0, 0, 0, 0.06);
    }

    .cover-blob.style {
      left: 4%;
      top: 48%;
      background: #F37024;
      transform: rotate(-8deg);
    }

    .cover-blob.music {
      right: 4%;
      top: 41%;
      background: #F06B63;
      transform: rotate(6deg);
    }

    .cover-blob.travel {
      left: 5%;
      bottom: 16%;
      background: #7FA146;
      transform: rotate(-8deg);
    }

    .hotspot {
      position: absolute;
      z-index: 4;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.46);
      background: rgba(18, 16, 14, 0.22);
      backdrop-filter: blur(8px);
      color: #FFF7E7;
      font-size: 0;
      overflow: hidden;
    }

    .hotspot::after {
      content: '';
      position: absolute;
      inset: 50% auto auto 50%;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      background: rgba(255, 247, 231, 0.92);
      box-shadow: 0 0 0 8px rgba(255, 247, 231, 0.12);
    }

    .hotspot.labelled {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 10px 14px;
      width: auto;
      height: auto;
      min-width: 92px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #FFF7E7;
    }

    .hotspot.labelled::after {
      display: none;
    }

    .cover-default .spot-music {
      left: 69%;
      top: 28%;
      width: 52px;
      height: 52px;
    }

    .cover-default .spot-write {
      left: 14%;
      top: 37%;
      width: 46px;
      height: 46px;
    }

    .cover-default .spot-today {
      left: 12%;
      top: 61%;
      width: 46px;
      height: 46px;
    }

    .cover-default .spot-travel {
      left: 16%;
      top: 86%;
      width: 50px;
      height: 50px;
    }

    .cover-default .spot-style {
      left: 12%;
      top: 52%;
      width: 130px;
      height: 56px;
      opacity: 0.01;
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
    }

    .cover-default .spot-archive {
      right: 4%;
      top: 88%;
      width: 54px;
      height: 54px;
    }

    .cover-composed .spot-write {
      left: 8%;
      top: 38%;
      width: 110px;
      height: 44px;
    }

    .cover-composed .spot-music {
      right: 8%;
      top: 28%;
      width: 54px;
      height: 54px;
    }

    .cover-composed .spot-style {
      left: 5%;
      top: 48%;
      width: 170px;
      height: 64px;
      opacity: 0.01;
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
    }

    .cover-composed .spot-travel {
      left: 6%;
      bottom: 18%;
      width: 170px;
      height: 64px;
      opacity: 0.01;
      background: transparent;
      border-color: transparent;
      backdrop-filter: none;
    }

    .cover-composed .spot-archive {
      right: 6%;
      bottom: 18%;
      width: 54px;
      height: 54px;
    }

    .cover-composed .spot-today {
      right: 8%;
      top: 61%;
      width: 54px;
      height: 54px;
    }

    .cover-meta {
      padding: 14px 0 0;
      text-align: center;
      color: var(--text-soft);
      font-size: 12px;
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .panel-copy {
      color: var(--text-soft);
      font-size: 13px;
    }

    .today-grid {
      grid-template-columns: 1.2fr 0.8fr;
    }

    .today-editorial {
      background: #F3ECDD;
      color: #191510;
      min-height: calc(100vh - 132px);
    }

    .today-hero {
      min-height: 170px;
      padding: 26px 34px;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 18px;
      align-items: start;
      background: #16130F;
      color: #F4EBDD;
      border-bottom: 1px solid rgba(25, 21, 16, 0.08);
    }

    .today-hero-quote {
      margin-top: 8px;
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      line-height: 0.95;
      letter-spacing: -0.04em;
      font-style: italic;
      max-width: 18ch;
    }

    .today-hero-copy {
      margin-top: 12px;
      color: rgba(244, 235, 221, 0.64);
      font-size: 13px;
    }

    .today-hero-meta {
      display: grid;
      justify-items: end;
      gap: 12px;
      text-align: right;
    }

    .today-issue-no {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3rem, 9vw, 5rem);
      line-height: 0.84;
      letter-spacing: -0.06em;
      opacity: 0.14;
    }

    .today-board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 0;
      border-top: 1px solid rgba(25, 21, 16, 0.08);
    }

    .today-block {
      min-height: 106px;
      padding: 18px 18px 16px;
      border-right: 1px solid rgba(25, 21, 16, 0.08);
      border-bottom: 1px solid rgba(25, 21, 16, 0.08);
      display: grid;
      align-content: space-between;
      gap: 12px;
    }

    .today-block:last-child {
      border-right: none;
    }

    .today-block.cream {
      background: #F3ECDD;
      color: #191510;
    }

    .today-block.ink {
      background: #16130F;
      color: #F4EBDD;
    }

    .today-block.sage {
      background: #8EA486;
      color: #FAF5E9;
    }

    .today-block.rust {
      background: #C87240;
      color: #FAF5E9;
    }

    .today-block.gold {
      background: #D1A93B;
      color: #FFF9EE;
    }

    .today-span-2 {
      grid-column: span 2;
    }

    .today-kicker {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.54;
    }

    .today-block-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.2rem, 2.3vw, 1.9rem);
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .today-block-copy {
      font-size: 13px;
      color: inherit;
      opacity: 0.72;
    }

    .today-music-mini {
      display: grid;
      grid-template-columns: 48px 1fr;
      gap: 12px;
      align-items: center;
    }

    .today-mini-embed {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      overflow: hidden;
      background: #1C1A16;
      border: 1px solid rgba(25, 21, 16, 0.08);
    }

    .today-mini-embed iframe {
      width: 100%;
      height: 100%;
      border: 0;
      transform: scale(2.4);
      transform-origin: top left;
      pointer-events: none;
    }

    .today-mini-embed .music-preview-art {
      min-height: 100%;
      height: 100%;
      padding: 6px;
      border-radius: 8px;
    }

    .today-mini-embed .music-preview-platform {
      font-size: 6px;
    }

    .today-mini-embed .music-preview-type {
      font-size: 0.78rem;
    }

    .today-streak-num {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      line-height: 0.9;
      text-align: center;
    }

    .today-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    .today-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(25, 21, 16, 0.14);
    }

    .today-dots span.on {
      background: #E87A3B;
    }

    .today-character {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 14px;
      align-items: end;
    }

    .today-character img {
      width: 54px;
      height: 76px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(244, 235, 221, 0.1);
      background: rgba(255, 255, 255, 0.04);
    }

    .today-moods {
      display: flex;
      justify-content: center;
      gap: 14px;
      font-size: 1.15rem;
    }

    .today-entry-arrow {
      justify-self: end;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.45;
    }

    .today-action {
      display: grid;
      place-items: center;
      text-align: center;
      cursor: pointer;
    }

    .today-action .today-block-title {
      font-size: 1rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    .lead-card {
      min-height: 270px;
      display: grid;
      gap: 16px;
      align-content: space-between;
      background: linear-gradient(140deg, rgba(110, 143, 184, 0.16), rgba(196, 113, 74, 0.08)), var(--panel);
    }

    .lead-card .panel-title {
      font-size: clamp(2rem, 4vw, 3.1rem);
      line-height: 0.95;
    }

    .stats-list,
    .week-list,
    .entry-list,
    .track-list,
    .character-list,
    .note-list {
      display: grid;
      gap: 10px;
    }

    .stat-row,
    .entry-card,
    .track-card,
    .character-card,
    .note-card {
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);
    }

    .entry-card.active {
      border-color: rgba(110, 143, 184, 0.34);
      background: rgba(110, 143, 184, 0.08);
    }

    .week-list {
      grid-template-columns: repeat(7, minmax(0, 1fr));
    }

    .week-chip {
      padding: 12px 8px;
      border-radius: 18px;
      border: 1px solid var(--line);
      text-align: center;
      background: rgba(255, 255, 255, 0.02);
    }

    .week-chip.done {
      background: rgba(110, 143, 184, 0.14);
      border-color: rgba(110, 143, 184, 0.34);
    }

    .week-chip.today {
      box-shadow: inset 0 0 0 1px rgba(244, 235, 221, 0.36);
    }

    .week-num {
      display: block;
      font-size: 16px;
      font-weight: 700;
      color: var(--cream);
    }

    .week-day {
      display: block;
      margin-top: 3px;
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .entry-meta,
    .micro-meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--text-dim);
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .entry-title {
      margin-top: 8px;
      font-family: 'Playfair Display', serif;
      font-size: 1.45rem;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .entry-body {
      margin-top: 8px;
      color: var(--text-soft);
      font-size: 13px;
    }

    .template-row,
    .mood-row,
    .cover-row {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .template-row::-webkit-scrollbar,
    .mood-row::-webkit-scrollbar,
    .cover-row::-webkit-scrollbar {
      display: none;
    }

    .template-btn,
    .mood-btn {
      padding: 11px 16px;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .template-btn.active,
    .mood-btn.active {
      background: var(--cream);
      color: #251D18;
      border-color: rgba(244, 235, 221, 0.28);
    }

    .write-grid {
      grid-template-columns: 1.15fr 0.85fr;
      align-items: start;
    }

    .write-column {
      display: grid;
      gap: 18px;
    }

    .editor-stack {
      display: grid;
      gap: 18px;
    }

    .editor-grid {
      display: grid;
      gap: 18px;
    }

    .paper-stack {
      position: absolute;
      top: 18%;

      width: 33%;
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.12);
      border: 1px solid rgba(0, 0, 0, 0.04);
      opacity: 0.95;
    }

    .paper-stack.left {
      left: -3%;
      transform: rotateY(60deg) rotateZ(-7deg);
      transform-origin: right center;
    }

    .paper-stack.right {
      right: -3%;
      transform: rotateY(-60deg) rotateZ(7deg);
      transform-origin: left center;
    }

    .paper-stack.left.second {
      left: 4%;
      top: 21%;
      bottom: 21%;
      width: 27%;
      opacity: 0.72;
    }

    .paper-stack.right.second {
      right: 4%;
      top: 21%;
      bottom: 21%;
      width: 27%;
      opacity: 0.72;
    }

    .paper-book-center {
      position: relative;
      z-index: 3;
      width: min(900px, calc(100% - 40px));
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      align-items: center;
      transform-style: preserve-3d;
    }

    .paper-book-center.flip-next .paper-leaf.right {
      animation: flip-right-page 0.68s cubic-bezier(0.2, 0.72, 0.16, 1);
    }

    .paper-book-center.flip-prev .paper-leaf.left {
      animation: flip-left-page 0.68s cubic-bezier(0.2, 0.72, 0.16, 1);
    }

    .paper-leaf {
      position: relative;
      min-height: 700px;
      padding: 14px;
      transform-style: preserve-3d;
    }

    .paper-leaf.left {
      transform: rotateY(18deg);
      transform-origin: right center;
      margin-right: -20px;
    }

    .paper-leaf.right {
      transform: rotateY(-18deg);
      transform-origin: left center;
      margin-left: -20px;
    }

    .paper-leaf::after {
      content: '';
      position: absolute;
      top: 4%;
      bottom: 4%;
      width: 14px;
      z-index: 3;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(0, 0, 0, 0.12), rgba(0, 0, 0, 0.02));
      filter: blur(6px);
      opacity: 0.28;
    }

    .paper-leaf.left::after {
      right: -7px;
    }

    .paper-leaf.right::after {
      left: -7px;
      transform: scaleX(-1);

      display: grid;
      grid-template-columns: 92px 1fr auto;

      align-items: center;
      padding: 14px;
      border-radius: 24px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.02);

    .music-list-meta {

    .progress {

    }

    .progress-fill {

    }

    .status-chip.locked {
      background: rgba(255, 255, 255, 0.02);
    }

    .list-editor {
      display: grid;
      gap: 12px;
    }

    .list-row {
      display: grid;

    }

    .list-index {

      font-size: 1.65rem;
      line-height: 1;

    .mini-input {

    }

    .mini-note {

    .note-form {

    }

    .note-input,

      width: 100%;
      padding: 14px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--line);
      color: var(--cream);
    }

    .note-textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.8;
    }

    .dock {
      position: fixed;
      left: 50%;
      bottom: 14px;
      z-index: 30;
      transform: translateX(-50%);
      width: min(calc(100% - 26px), 840px);
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
      padding: 10px;
      border-radius: 999px;
      border: 1px solid rgba(244, 235, 221, 0.12);
      background: rgba(240, 232, 219, 0.12);
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
    }

    .dock-btn {
      min-height: 62px;
      padding: 8px 6px;
      flex-direction: column;
      color: rgba(250, 244, 235, 0.78);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .dock-btn strong {
      font-size: 18px;
      line-height: 1;
      margin-bottom: 5px;
      color: currentColor;
    }

    .dock-btn.active {
      background: rgba(244, 235, 221, 0.94);
      color: #241D18;
    }

    .dock-btn:not(.active):hover {
      background: rgba(255, 255, 255, 0.06);
    }

    .toast {
      position: fixed;
      left: 50%;
      top: 18px;
      z-index: 40;
      transform: translateX(-50%) translateY(-12px);
      opacity: 0;
      pointer-events: none;
      padding: 12px 16px;
      border-radius: 999px;
      background: rgba(12, 10, 8, 0.94);
      color: var(--cream);
      border: 1px solid rgba(244, 235, 221, 0.12);
      font-size: 12px;
      letter-spacing: 0.04em;
      transition: 0.3s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .hidden-input {
      display: none;
    }

    @media (max-width: 1180px) {
      .today-grid,
      .write-grid,
      .music-grid,
      .notes-grid,
      .book-stage {

      }

    @media (max-width: 860px) {

        --page-pad: 10px;
      }

      .module-header,
      .topbar {
        padding-left: 14px;
        padding-right: 14px;
      }

      .editor-grid.editorial,
      .editor-grid.minimal,
      .editor-grid.photo,
      .editor-grid.quote,
      .editor-grid.list,
      .character-list,
      .week-list,
      .book-pages,
      .archive-gallery {
        grid-template-columns: 1fr;
      }

      .cover-card {
        width: min(100%, 540px);
      }

      .dock {
        width: min(calc(100% - 16px), 640px);
      }
    }
  </style>
</head>

  <script>
    const STORAGE_KEY = 'magazine-journal-cityboy-v3';
    const MEMORY_STORE = {};
    const MODULES = [

    const TEMPLATES = [
      { id: 'editorial', label: 'Editorial' },

      { id: 'photo', label: 'Photo-led' },
      { id: 'quote', label: 'Quote' },
      { id: 'list', label: 'List' }
    ];
    const MUSIC_PLATFORMS = [
      { id: 'spotify', label: 'Spotify' },
      { id: 'apple', label: 'Apple Music' },
      { id: 'netease', label: 'Netease' },
      { id: 'custom', label: 'Custom Link' }
    ];
    const JOURNAL_COVERS = [
      { id: 'none', label: 'No cover', src: '' },
      { id: 'deco', label: 'Cafe Code', src: 'deco.png' },
      { id: 'deco2', label: 'Donut Cafe', src: 'deco2.png' }
    ];
    const PERSONAS = [
      {
        id: 'city-wanderer',
        name: 'The City Wanderer',
        unlock: 0,
        coverMode: 'image',
        coverSrc: 'Mainvisual.png',
        subtitle: 'Original illustrated issue cover.'
      },
      {
        id: 'the-artist',
        name: 'The Artist',
        unlock: 2,
        coverMode: 'composed',
        coverSrc: 'persona2.png',
        subtitle: 'New persona reference added to the cover rotation.'
      },
      {
        id: 'the-music-head',
        name: 'The Music Head',
        unlock: 3,
        coverMode: 'composed',
        coverSrc: 'persona3.png',
        subtitle: 'Headphone issue version for music-heavy weeks.'
      }
    ];
    const TROPHIES = [
      {
        id: 'first-page',
        title: 'First Page',
        description: '完成第 1 条 journal entry。',
        unlocked: (stats) => stats.entryCount >= 1
      },
      {
        id: 'three-day-strike',
        title: '3-Day Strike',
        description: '连续 3 天写作。',
        unlocked: (stats) => stats.streak >= 3
      },
      {
        id: 'music-linker',
        title: 'Music Linker',
        description: '关联 3 首歌曲到日记。',
        unlocked: (stats) => stats.linkedSongs >= 3
      },
      {
        id: 'photo-story',
        title: 'Photo Story',
        description: '完成 3 条 Photo-led 条目。',
        unlocked: (stats) => stats.photoEntries >= 3
      },
      {
        id: 'deep-writer',
        title: 'Deep Writer',
        description: '累计超过 1800 字。',
        unlocked: (stats) => stats.totalWords >= 1800
      }
    ];

    let currentScreen = 'cover';
    let archiveFlipTimer = null;
    let appState = loadState();

    function storageGet(key) {
      try {
        return window.localStorage.getItem(key);
      } catch (error) {
        return MEMORY_STORE[key] || null;
      }
    }

    function storageSet(key, value) {
      try {
        window.localStorage.setItem(key, value);
      } catch (error) {
        MEMORY_STORE[key] = value;
      }
    }

    function isoDate(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, '0');
      const day = String(date.getDate()).padStart(2, '0');
      return year + '-' + month + '-' + day;
    }

    function parseCalendarDate(value) {
      if (typeof value === 'string' && /^\d{4}-\d{2}-\d{2}$/.test(value)) {
        return new Date(value + 'T00:00:00');
      }
      return new Date(value);
    }

    function niceDate(value) {
      return parseCalendarDate(value).toLocaleDateString('en-US', {
        month: 'short',
        day: 'numeric',
        weekday: 'short'
      });
    }

    function dayLabel(date) {
      return date.toLocaleDateString('en-US', { weekday: 'short' });
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function excerpt(text, count) {
      const clean = String(text || '').trim().replace(/\s+/g, ' ');
      return clean.length > count ? clean.slice(0, count).trim() + '…' : clean;
    }

    function wordCount(text) {
      const clean = String(text || '').trim();
      return clean ? clean.split(/\s+/).length : 0;
    }

    function nextId(prefix) {
      return prefix + '-' + Date.now() + '-' + Math.random().toString(16).slice(2, 7);
    }

    function daysBetween(left, right) {
      const dayMs = 24 * 60 * 60 * 1000;
      const a = new Date(left.getFullYear(), left.getMonth(), left.getDate()).getTime();
      const b = new Date(right.getFullYear(), right.getMonth(), right.getDate()).getTime();
      return Math.round((a - b) / dayMs);
    }

    function defaultListItems() {
      return [
        { title: '', note: '' },
        { title: '', note: '' },
        { title: '', note: '' }
      ];
    }

    function defaultDraft() {
      return {
        template: 'minimal',
        mood: 'glowing',
        title: '',
        dek: '',
        body: '',
        pullquote: '',
        imageData: '',
        musicOpen: false,
        musicUrl: '',
        quoteBy: '',
        coverAsset: 'deco2',
        listItems: defaultListItems()
      };
    }

    function buildDefaultState() {
      return {
        draft: defaultDraft(),
        styleDraft: { title: '', note: '' },
        travelDraft: { title: '', note: '' },
        archive: {
          view: 'gallery',
          selectedEntryId: 'entry-2',
          flipDir: ''
        },
        profile: {
          selectedPersona: 'city-wanderer'
        },
        entries: [
          {
            id: 'entry-1',
            date: '2026-04-04',
            createdAt: '2026-04-04T22:16:00',
            template: 'photo',
            mood: 'chill',
            title: 'Blue Hour Ride to Jingan',
            dek: 'Bike lane air, low clouds, and one denim jacket that finally felt like spring.',
            body: 'Rode home slowly so I could keep the blue light a little longer. A coffee stop, one good song, and a slow route were enough to make the day feel like a proper magazine spread.',
            pullquote: 'Some days only need good light and a longer way home.',
            imageData: '',
            music: {
              url: 'https://open.spotify.com/track/late-tram-window',
              platform: 'spotify',
              label: 'Spotify',
              title: 'Late Tram Window',
              subtitle: 'spotify.com'
            },
            quoteBy: '',
            coverAsset: 'deco',
            listItems: defaultListItems(),
            wordCount: 34
          },
          {
            id: 'entry-2',
            date: '2026-04-05',
            createdAt: '2026-04-05T23:02:00',
            template: 'editorial',
            mood: 'focused',
            title: 'Bagel, grey knit, same corner table',
            dek: 'The kind of Sunday that looks small from the outside but stacks beautifully in memory.',
            body: 'I wrote three clean paragraphs, circled one lyric in the margin, and decided this journal should feel like an issue worth reopening instead of a task list worth clearing.',
            pullquote: 'Live simple, dress well, keep the page open.',
            imageData: '',
            music: {
              url: 'https://music.apple.com/example/bagel-and-denim',
              platform: 'apple',
              label: 'Apple Music',
              title: 'Bagel & Denim',
              subtitle: 'music.apple.com'
            },
            quoteBy: '',
            coverAsset: 'deco2',
            listItems: defaultListItems(),
            wordCount: 29
          }
        ],
        styleNotes: [
          {
            id: 'style-1',
            title: 'Spring uniform',
            note: 'Grey knit, wide denim, white tee, orange-accent sneakers. Keep silhouettes relaxed and clean.'
          }
        ],
        travelNotes: [
          {
            id: 'travel-1',
            title: 'Weekend loop',
            note: 'Coffee stop, riverside cycle, bookstore, then one dinner place worth saving in the archive.'
          }
        ]
      };
    }

    // Rehydrate saved data safely, while also repairing any missing draft fields after schema changes.
    function loadState() {
      const raw = storageGet(STORAGE_KEY);
      if (!raw) {
        return buildDefaultState();
      }

      try {
        const parsed = JSON.parse(raw);
        return {
          ...buildDefaultState(),
          ...parsed,
          draft: {
            ...defaultDraft(),
            ...(parsed.draft || {}),
            listItems: Array.isArray(parsed.draft && parsed.draft.listItems) && parsed.draft.listItems.length
              ? parsed.draft.listItems
              : defaultListItems()
          },
          styleDraft: { title: '', note: '', ...(parsed.styleDraft || {}) },
          travelDraft: { title: '', note: '', ...(parsed.travelDraft || {}) },
          archive: { view: 'gallery', selectedEntryId: 'entry-2', flipDir: '', ...(parsed.archive || {}) },
          profile: { selectedPersona: 'city-wanderer', ...(parsed.profile || {}) }
        };
      } catch (error) {
        return buildDefaultState();
      }
    }

    function saveState() {
      storageSet(STORAGE_KEY, JSON.stringify(appState));
    }

    function getPersona(id) {
      return PERSONAS.find((persona) => persona.id === id) || PERSONAS[0];
    }

    function getCoverAsset(id) {
      return JOURNAL_COVERS.find((cover) => cover.id === id) || JOURNAL_COVERS[0];
    }

    function detectMusicPlatform(url) {
      const value = String(url || '').toLowerCase();
      if (value.includes('spotify.com')) {
        return 'spotify';
      }
      if (value.includes('music.apple.com') || value.includes('itunes.apple.com')) {
        return 'apple';
      }
      if (value.includes('music.163.com') || value.includes('y.music.163.com')) {
        return 'netease';
      }
      return 'custom';
    }

    function platformLabel(platform) {
      const match = MUSIC_PLATFORMS.find((item) => item.id === platform);
      return match ? match.label : 'Custom Link';
    }

    function getSpotifyEmbedUrl(url) {
      try {
        const parsed = new URL(url, window.location.href);
        if (!parsed.hostname.includes('spotify.com')) {
          return '';
        }

        const parts = parsed.pathname.split('/').filter(Boolean);
        const spotifyIndex = parts.findIndex((part) => ['album', 'track', 'playlist', 'artist', 'episode', 'show'].includes(part));
        if (spotifyIndex === -1 || !parts[spotifyIndex + 1]) {
          return '';
        }

        const type = parts[spotifyIndex];
        const id = parts[spotifyIndex + 1];
        return 'https://open.spotify.com/embed/' + type + '/' + id + '?utm_source=generator&theme=0';
      } catch (error) {
        return '';
      }
    }

    function musicTypeFromUrl(url) {
      const value = String(url || '').toLowerCase();
      if (value.includes('/album/')) {
        return 'Album';
      }
      if (value.includes('/playlist/')) {
        return 'Playlist';
      }
      if (value.includes('/track/') || value.includes('/song?')) {
        return 'Track';
      }
      if (value.includes('/artist/')) {
        return 'Artist';
      }
      return 'Link';
    }

    function titleFromMusicUrl(url) {
      const value = String(url || '').trim();
      if (!value) {
        return '';
      }

      try {
        const parsed = new URL(value, window.location.href);
        const parts = parsed.pathname.split('/').filter(Boolean);
        const slug = parts[parts.length - 1] || parts[parts.length - 2] || '';
        const clean = decodeURIComponent(slug)
          .replace(/\?.*$/, '')
          .replace(/[-_]+/g, ' ')
          .replace(/\b(album|playlist|track|song|artist)\b/gi, '')
          .replace(/\s{2,}/g, ' ')
          .trim();
        if (!clean || /^[0-9a-z]{10,}$/i.test(clean)) {
          return '';
        }
        return clean.replace(/\b\w/g, (letter) => letter.toUpperCase());
      } catch (error) {
        return '';
      }
    }

    // Build a lightweight faux-player card from a pasted music URL without depending on external metadata APIs.
    function getMusicAttachment(input, fallbackTitle) {
      if (!input) {
        return null;
      }

      if (typeof input === 'string') {
        const platform = detectMusicPlatform(input);
        const type = musicTypeFromUrl(input);
        let subtitle = '';
        try {
          subtitle = new URL(input, window.location.href).hostname.replace(/^www\./, '');
        } catch (error) {
          subtitle = 'Attached from URL';
        }
        return {
          url: input,
          platform,
          type,
          label: platformLabel(platform),
          title: titleFromMusicUrl(input) || fallbackTitle || type + ' Link',
          subtitle,
          meta: platformLabel(platform) + ' · ' + type,
          embedUrl: platform === 'spotify' ? getSpotifyEmbedUrl(input) : ''
        };
      }

      return input.url ? {
        type: input.type || musicTypeFromUrl(input.url),
        label: input.label || platformLabel(input.platform),
        meta: input.meta || ((input.label || platformLabel(input.platform)) + ' · ' + (input.type || musicTypeFromUrl(input.url))),
        embedUrl: input.embedUrl || (input.platform === 'spotify' ? getSpotifyEmbedUrl(input.url) : ''),
        ...input
      } : null;
    }

    function renderMusicVisual(attachment, context) {
      if (attachment.embedUrl) {
        return `
          <div class="music-embed-wrap">
            <iframe
              src="${escapeHtml(attachment.embedUrl)}"
              allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture"
              loading="lazy"
            ></iframe>
          </div>
        `;
      }

      return `
        <div class="music-preview-art platform-${attachment.platform}">
          <div class="music-preview-platform">${escapeHtml(attachment.label)}</div>
          <div class="music-preview-type">${escapeHtml(context === 'list' ? (attachment.type || 'Music') : (attachment.type || 'Album'))}</div>
        </div>
      `;
    }

    function renderMusicAttachmentCard(attachment, context) {
      if (!attachment) {
        return '';
      }

      const compact = context === 'list';
      return `
        <div class="music-preview-card ${compact ? 'compact' : ''} ${attachment.embedUrl ? 'has-embed' : ''}">
          ${renderMusicVisual(attachment, context)}
          <div class="music-preview-copy">
            <div class="music-preview-badge">${escapeHtml(attachment.meta || attachment.label)}</div>
            <div class="music-preview-title">${escapeHtml(attachment.title || 'Music Link')}</div>
            <div class="music-preview-meta">${escapeHtml(attachment.subtitle || 'Attached from URL')}</div>
            <div class="music-preview-actions">
              <span class="status-chip ${compact ? '' : 'active'}">${escapeHtml(context === 'list' ? 'Saved in journal' : 'Will publish with page')}</span>
              <button class="ghost-btn music-open-btn" data-action="open-music-url" data-music-url="${escapeHtml(attachment.url)}">Open link</button>
            </div>
          </div>
        </div>
      `;

    function draftAsEntry(draft) {

    // Compute streaks, trophy unlocks, and selected persona availability from the saved entry archive.
    function deriveStats(state) {
      const entries = [...state.entries].sort((left, right) => new Date(right.createdAt) - new Date(left.createdAt));
      const dateSet = [...new Set(entries.map((entry) => entry.date))].sort((left, right) => parseCalendarDate(right) - parseCalendarDate(left));
      const totalWords = entries.reduce((sum, entry) => sum + (entry.wordCount || wordCount(entry.body)), 0);
      const linkedSongs = entries.filter((entry) => entry.music && entry.music.url).length;
      const photoEntries = entries.filter((entry) => entry.template === 'photo').length;
      const today = new Date();
      const todayKey = isoDate(today);
      let streak = 0;

      if (dateSet.length) {
        const latest = parseCalendarDate(dateSet[0]);
        const gap = daysBetween(today, latest);
        if (gap <= 1) {
          let cursor = latest;
          while (dateSet.includes(isoDate(cursor))) {
            streak += 1;
            cursor = new Date(cursor);
            cursor.setDate(cursor.getDate() - 1);
          }
        }
      }

      const trophies = TROPHIES.map((trophy) => ({
        ...trophy,
        isUnlocked: trophy.unlocked({
          entryCount: entries.length,
          linkedSongs,
          photoEntries,
          totalWords,
          streak
        })
      }));
      const trophyCount = trophies.filter((trophy) => trophy.isUnlocked).length;
      const unlockedPersonas = PERSONAS.filter((persona) => trophyCount >= persona.unlock);
      const selectedPersona = unlockedPersonas.find((persona) => persona.id === state.profile.selectedPersona) || PERSONAS[0];
      const week = [];

      for (let offset = 6; offset >= 0; offset -= 1) {
        const current = new Date(today);
        current.setDate(today.getDate() - offset);
        const currentKey = isoDate(current);
        week.push({
          key: currentKey,
          day: dayLabel(current),
          num: current.getDate(),
          done: dateSet.includes(currentKey),
          today: currentKey === todayKey
        });
      }

      return {
        entries,
        latestEntry: entries[0] || null,
        entryCount: entries.length,
        linkedSongs,
        photoEntries,
        totalWords,
        streak,
        trophies,
        trophyCount,
        unlockedPersonas,
        selectedPersona,
        todayDone: dateSet.includes(todayKey),
        week
      };
    }

    function renderAll() {
      const stats = deriveStats(appState);
      renderCover(stats);

      renderWrite(stats);

      renderTravel(stats);
      renderArchive(stats);

    function setScreen(screen) {
      currentScreen = screen;
      document.querySelectorAll('.screen').forEach((element) => {
        element.classList.toggle('active', element.id === 'screen-' + screen);
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    function syncWriteMusicPreview() {
      const preview = document.getElementById('write-music-preview');
      if (!preview) {
        return;
      }

      preview.innerHTML = appState.draft.musicUrl
        ? renderMusicAttachmentCard(getMusicAttachment(appState.draft.musicUrl, appState.draft.title || appState.draft.dek || 'Music Link'))
        : '';
    }

    function updateDraft(field, value) {
      appState.draft[field] = value;
      saveState();
      if (appState.draft.musicUrl) {
        syncWriteMusicPreview();
      }
    }

    // Keep the list template editable by storing each row as structured draft data instead of flattening it into body text.
    function updateListItem(index, key, value) {
      if (!appState.draft.listItems[index]) {
        appState.draft.listItems[index] = { title: '', note: '' };
      }
      appState.draft.listItems[index][key] = value;
      saveState();
    }

    function addListItem() {
      appState.draft.listItems.push({ title: '', note: '' });
      saveState();
      renderAll();
      setScreen('write');
    }

    function setCoverChoice(coverId) {
      appState.draft.coverAsset = coverId;
      saveState();
      renderAll();
      setScreen('write');
    }

    function triggerArchiveFlip(direction) {
      appState.archive.flipDir = direction;
      saveState();
      clearTimeout(archiveFlipTimer);
      archiveFlipTimer = setTimeout(() => {
        appState.archive.flipDir = '';
        saveState();
        if (currentScreen === 'archive') {
          renderAll();
          setScreen('archive');
        }
      }, 720);
    }

    function setArchiveView(view) {
      appState.archive.view = view;
      saveState();
      renderAll();
      setScreen('archive');
    }

    function selectArchiveEntry(entryId) {
      const stats = deriveStats(appState);
      const entries = getArchiveEntries(stats);
      const current = getSelectedArchiveEntry(stats);
      const next = entries.find((entry) => entry.id === entryId);
      if (current && next) {
        const currentIndex = entries.findIndex((entry) => entry.id === current.id);
        const nextIndex = entries.findIndex((entry) => entry.id === next.id);
        if (nextIndex !== currentIndex) {
          triggerArchiveFlip(nextIndex > currentIndex ? 'next' : 'prev');
        }
      }
      appState.archive.selectedEntryId = entryId;
      saveState();
      renderAll();
      setScreen('archive');
    }

    function stepArchiveEntry(delta) {
      const stats = deriveStats(appState);
      const entries = getArchiveEntries(stats);
      if (!entries.length) {
        return;
      }

      const current = getSelectedArchiveEntry(stats);
      const index = current ? entries.findIndex((entry) => entry.id === current.id) : 0;
      const nextIndex = Math.min(entries.length - 1, Math.max(0, index + delta));
      if (nextIndex !== index) {
        triggerArchiveFlip(delta > 0 ? 'next' : 'prev');
      }
      appState.archive.selectedEntryId = entries[nextIndex].id;
      saveState();
      renderAll();
      setScreen('archive');
    }

    function addNote(type) {
      const draftKey = type + 'Draft';
      const listKey = type === 'style' ? 'styleNotes' : 'travelNotes';
      const title = appState[draftKey].title.trim();
      const note = appState[draftKey].note.trim();

      if (!title || !note) {
        showToast('先写一个标题和内容。');
        return;
      }

      appState[listKey].unshift({
        id: nextId(type),
        title,
        note
      });
      appState[draftKey] = { title: '', note: '' };
      saveState();
      renderAll();
      setScreen(type === 'style' ? 'style' : 'travel');
      showToast(type === 'style' ? 'Style note saved.' : 'Travel note saved.');
    }

    function draftToWordCount(draft) {
      if (draft.template === 'list') {
        return draft.listItems.reduce((sum, item) => sum + wordCount(item.title) + wordCount(item.note), 0);
      }
      if (draft.template === 'quote') {
        return wordCount(draft.pullquote) + wordCount(draft.body) + wordCount(draft.quoteBy);
      }
      return wordCount(draft.title) + wordCount(draft.dek) + wordCount(draft.body) + wordCount(draft.pullquote);
    }

    // Publish the current layout-aware draft, then recompute trophies and persona unlock status from the archive.
    function publishEntry() {
      const draft = appState.draft;
      const titleSource = draft.template === 'quote' ? (draft.pullquote || draft.dek) : draft.title;
      const bodySource = draft.template === 'list'
        ? draft.listItems.map((item) => (item.title + ' ' + item.note).trim()).filter(Boolean).join(' ')
        : draft.body || draft.pullquote;

      if (!titleSource.trim() || !bodySource.trim()) {
        showToast('当前版式还需要至少一个标题和正文。');
        return;
      }

      const before = deriveStats(appState);
      const now = new Date();
      const music = getMusicAttachment(draft.musicUrl, titleSource.trim());

      const newEntry = {
        id: nextId('entry'),
        date: isoDate(now),
        createdAt: now.toISOString(),
        template: draft.template,
        mood: draft.mood,
        title: titleSource.trim(),
        dek: draft.dek.trim(),
        body: bodySource.trim(),
        pullquote: draft.pullquote.trim(),
        imageData: draft.imageData,
        music,
        quoteBy: draft.quoteBy.trim(),
        coverAsset: draft.coverAsset,
        listItems: draft.listItems.map((item) => ({ title: item.title, note: item.note })),
        wordCount: draftToWordCount(draft)
      };

      appState.entries.unshift(newEntry);
      appState.archive.view = 'book';
      appState.archive.selectedEntryId = newEntry.id;
      appState.archive.flipDir = '';

      appState.draft = {
        ...defaultDraft(),
        template: draft.template,
        mood: draft.mood,
        coverAsset: draft.coverAsset
      };
      saveState();

      const after = deriveStats(appState);
      renderAll();
      setScreen('archive');
      triggerArchiveFlip('next');

      if (after.trophyCount > before.trophyCount) {
        showToast('Published. New trophy unlocked.');
        return;
      }

      showToast('Published to the archive.');
    }

    function choosePersona(personaId) {
      const stats = deriveStats(appState);
      const persona = getPersona(personaId);

      if (stats.trophyCount < persona.unlock) {
        showToast('还差 ' + (persona.unlock - stats.trophyCount) + ' 枚奖杯。');
        return;
      }

      appState.profile.selectedPersona = personaId;
      saveState();
      renderAll();
      setScreen('cover');
      showToast(persona.name + ' selected.');
    }

    function toggleMusicAttach() {
      appState.draft.musicOpen = !appState.draft.musicOpen;
      saveState();
      renderAll();
      setScreen('write');
    }

    function openMusicUrl(url) {
      const target = String(url || '').trim();
      if (!target) {
        showToast('这个音乐链接还没有填写。');
        return;
      }
      window.open(target, '_blank', 'noopener,noreferrer');
    }

    function handleImage(file) {
      if (!file) {
        return;
      }

      if (!file.type || !file.type.startsWith('image/')) {
        showToast('请选择图片文件。');
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        appState.draft.imageData = reader.result;
        saveState();
        renderAll();
        setScreen('write');
        showToast('Image added to the draft.');
      };
      reader.onerror = () => {
        showToast('图片读取失败，请再试一次。');
      };
      reader.readAsDataURL(file);
    }

    function handleMusicUrlInput(value) {
      appState.draft.musicUrl = value.trim();
      if (appState.draft.musicUrl) {
        appState.draft.musicOpen = true;
      }
      saveState();
      syncWriteMusicPreview();
    }

    function clearMusicUrl() {
      appState.draft.musicUrl = '';
      appState.draft.musicOpen = false;
      saveState();
      renderAll();
      setScreen('write');
    }

    document.addEventListener('click', (event) => {
      const openTarget = event.target.closest('[data-open]');
      if (openTarget) {
        setScreen(openTarget.getAttribute('data-open'));
        return;
      }

      const templateTarget = event.target.closest('[data-template]');
      if (templateTarget) {
        appState.draft.template = templateTarget.getAttribute('data-template');
        saveState();
        renderAll();
        setScreen('write');
        return;
      }

      const moodTarget = event.target.closest('[data-mood]');
      if (moodTarget) {
        appState.draft.mood = moodTarget.getAttribute('data-mood');
        saveState();
        renderAll();
        setScreen('write');
        return;
      }

      const coverTarget = event.target.closest('[data-cover-choice]');
      if (coverTarget) {
        setCoverChoice(coverTarget.getAttribute('data-cover-choice'));
        return;
      }

      const archiveViewTarget = event.target.closest('[data-archive-view]');
      if (archiveViewTarget) {
        setArchiveView(archiveViewTarget.getAttribute('data-archive-view'));
        return;
      }

      const entryTarget = event.target.closest('[data-entry-id]');
      if (entryTarget) {
        selectArchiveEntry(entryTarget.getAttribute('data-entry-id'));
        return;
      }

      const entryNavTarget = event.target.closest('[data-entry-nav]');
      if (entryNavTarget) {
        stepArchiveEntry(Number(entryNavTarget.getAttribute('data-entry-nav')));
        return;
      }

      const musicTarget = event.target.closest('[data-music-url]');
      if (musicTarget) {
        openMusicUrl(musicTarget.getAttribute('data-music-url'));
        return;
      }

      const personaTarget = event.target.closest('[data-persona]');
      if (personaTarget) {
        choosePersona(personaTarget.getAttribute('data-persona'));
        return;
      }

      const actionTarget = event.target.closest('[data-action]');
      if (!actionTarget) {
        return;
      }

      const action = actionTarget.getAttribute('data-action');
      if (action === 'publish-entry') {
        publishEntry();
      } else if (action === 'toggle-music-attach') {
        toggleMusicAttach();
      } else if (action === 'clear-music-url') {
        clearMusicUrl();
      } else if (action === 'open-music-url') {
        openMusicUrl(actionTarget.getAttribute('data-music-url'));
      } else if (action === 'open-image-picker') {
        document.getElementById('draft-image-input').click();
      } else if (action === 'add-style-note') {
        addNote('style');
      } else if (action === 'add-travel-note') {
        addNote('travel');
      } else if (action === 'add-list-item') {
        addListItem();
      }
    });

    document.addEventListener('input', (event) => {
      const field = event.target.getAttribute('data-draft-field');
      if (field) {
        const value = event.target.type === 'checkbox' ? event.target.checked : event.target.value;
        if (field === 'musicUrl') {
          handleMusicUrlInput(value);
          return;
        }
        updateDraft(field, value);
        return;
      }

      const listTitle = event.target.getAttribute('data-list-title');
      if (listTitle !== null) {
        updateListItem(Number(listTitle), 'title', event.target.value);
        return;
      }

      const listNote = event.target.getAttribute('data-list-note');
      if (listNote !== null) {
        updateListItem(Number(listNote), 'note', event.target.value);
        return;
      }

      const noteField = event.target.getAttribute('data-note-field');
      if (!noteField) {
        return;
      }

      if (noteField === 'style-title') {
        appState.styleDraft.title = event.target.value;
      } else if (noteField === 'style-note') {
        appState.styleDraft.note = event.target.value;
      } else if (noteField === 'travel-title') {
        appState.travelDraft.title = event.target.value;
      } else if (noteField === 'travel-note') {
        appState.travelDraft.note = event.target.value;
      }

      saveState();
    });

    document.getElementById('draft-image-input').addEventListener('change', (event) => {
      handleImage(event.target.files && event.target.files[0]);
      event.target.value = '';
    });

    renderAll();
  </script>
</body>
</html>
